<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Obrona 100% — gra do nauki</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#11172a; --bg2:#0b1020; --surface:#1a2240; --surface2:#222c50;
  --line:rgba(255,255,255,.09); --line2:rgba(255,255,255,.16);
  --text:#eaf0fb; --muted:#96a2c2; --gold:#f4bd63; --green:#48c78e; --red:#e56a63;
  --shadow:0 18px 40px -18px rgba(0,0,0,.7);
  --serif:'Fraunces',Georgia,'Times New Roman',serif;
  --sans:'Inter',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:var(--sans); color:var(--text);
  background:
    radial-gradient(1200px 700px at 80% -10%, rgba(122,140,255,.14), transparent 60%),
    radial-gradient(1000px 600px at -10% 110%, rgba(244,189,99,.10), transparent 55%),
    var(--bg);
  -webkit-font-smoothing:antialiased; line-height:1.5; overflow-x:hidden;
}
.wrap{max-width:820px;margin:0 auto;padding:22px 18px 90px;min-height:100%}
.topbar{display:flex;align-items:center;gap:14px;margin-bottom:26px}
.brand{display:flex;align-items:center;gap:11px;cursor:pointer}
.mark{width:34px;height:34px;border-radius:9px;flex:none;
  background:conic-gradient(from 210deg,var(--gold),#e8734a,#b07de0,#6d8bff,var(--gold));
  box-shadow:inset 0 0 0 1px rgba(255,255,255,.2)}
.brand b{font-family:var(--serif);font-weight:600;font-size:1.05rem;letter-spacing:.2px}
.brand span{color:var(--muted);font-size:.78rem;display:block;margin-top:-2px}
.topbar .spacer{flex:1}
.stat{display:flex;align-items:center;gap:7px;font-size:.82rem;color:var(--muted);
  background:var(--surface);border:1px solid var(--line);padding:6px 11px;border-radius:999px}
.stat b{color:var(--text)}
.streak-on{color:var(--gold);border-color:rgba(244,189,99,.4);animation:pulse 1.4s ease-in-out infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(244,189,99,.35)}50%{box-shadow:0 0 0 7px rgba(244,189,99,0)}}

.screen{animation:enter .45s cubic-bezier(.2,.8,.2,1) both}
@keyframes enter{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

.hero h1{font-family:var(--serif);font-weight:600;font-size:2.15rem;line-height:1.08;letter-spacing:-.5px}
.hero h1 em{font-style:italic;color:var(--gold)}
.hero p{color:var(--muted);margin-top:10px;max-width:60ch}
.overall{display:flex;align-items:center;gap:16px;margin:22px 0 8px;
  background:linear-gradient(180deg,var(--surface),rgba(26,34,64,.5));
  border:1px solid var(--line);border-radius:16px;padding:16px 18px;box-shadow:var(--shadow)}
.overall .ringbox{position:relative;flex:none}
.overall .ringbox .pct{position:absolute;inset:0;display:grid;place-items:center;font-weight:700;font-size:.9rem}
.overall .txt small{color:var(--muted);font-size:.8rem}
.overall .txt div{font-weight:600;margin-top:2px}

.modes{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:18px 0 26px}
.mode{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:15px 14px;
  cursor:pointer;text-align:left;color:var(--text);transition:transform .18s,border-color .18s,background .18s}
.mode:hover{transform:translateY(-3px);border-color:var(--line2);background:var(--surface2)}
.mode .ic{font-size:1.4rem;line-height:1}
.mode b{display:block;margin:9px 0 3px;font-size:.98rem}
.mode small{color:var(--muted);font-size:.78rem;line-height:1.35;display:block}

.sect-label{display:flex;align-items:center;gap:10px;margin:8px 2px 14px;color:var(--muted);
  font-size:.76rem;text-transform:uppercase;letter-spacing:.14em}
.sect-label:after{content:"";flex:1;height:1px;background:var(--line)}

.books{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
@media(max-width:620px){.books,.modes{grid-template-columns:repeat(2,1fr)}.wrap{padding-bottom:80px}}
@media(max-width:400px){.books{grid-template-columns:1fr}}
.book{position:relative;color:var(--text);background:var(--surface);border:1px solid var(--line);border-radius:14px;
  padding:14px;cursor:pointer;overflow:hidden;transition:transform .18s,border-color .18s}
.book:hover{transform:translateY(-3px);border-color:var(--bc,var(--line2))}
.book:before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--bc)}
.book .num{font-family:var(--serif);font-size:.8rem;color:var(--bc);font-weight:600}
.book h3{font-size:.92rem;margin:3px 0 2px;line-height:1.2;color:var(--text)}
.book .auth{color:var(--muted);font-size:.76rem}
.book .mini{margin-top:10px;height:5px;border-radius:99px;background:rgba(255,255,255,.08);overflow:hidden}
.book .mini i{display:block;height:100%;width:0;background:var(--bc);border-radius:99px;transition:width .8s cubic-bezier(.2,.8,.2,1)}
.book .done{position:absolute;top:11px;right:11px;color:var(--green);font-size:.9rem;opacity:0;transform:scale(.5);transition:.3s}
.book.mastered .done{opacity:1;transform:scale(1)}

.panel{background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:22px;box-shadow:var(--shadow)}
.crumb{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.chip{font-size:.74rem;padding:5px 11px;border-radius:999px;border:1px solid var(--line);color:var(--muted)}
.chip.book-chip{color:var(--bc);border-color:var(--bc)}
.back{background:none;border:none;color:var(--muted);cursor:pointer;font-size:.85rem;font-family:var(--sans);display:inline-flex;gap:6px;align-items:center}
.back:hover{color:var(--text)}

.progress-dots{display:flex;gap:6px;margin-bottom:18px}
.progress-dots i{height:5px;flex:1;border-radius:99px;background:rgba(255,255,255,.1);transition:.3s}
.progress-dots i.cur{background:var(--gold)}
.progress-dots i.ok{background:var(--green)}
.progress-dots i.no{background:var(--red)}

.q{font-family:var(--serif);font-weight:600;font-size:1.4rem;line-height:1.28;margin-bottom:18px}
.opts{display:grid;gap:10px}
.opt{position:relative;text-align:left;background:var(--surface2);border:1px solid var(--line);
  border-radius:12px;padding:14px 16px 14px 48px;cursor:pointer;color:var(--text);font-size:.96rem;
  font-family:var(--sans);transition:transform .12s,border-color .15s,background .15s}
.opt:hover:not(.locked){border-color:var(--line2);transform:translateX(3px)}
.opt .key{position:absolute;left:13px;top:50%;transform:translateY(-50%);width:24px;height:24px;border-radius:7px;
  display:grid;place-items:center;font-size:.78rem;font-weight:700;background:rgba(255,255,255,.08);color:var(--muted)}
.opt.locked{cursor:default}
.opt.correct{border-color:var(--green);background:rgba(72,199,142,.14)}
.opt.correct .key{background:var(--green);color:#06231a}
.opt.wrong{border-color:var(--red);background:rgba(229,106,99,.13);animation:shake .4s}
.opt.wrong .key{background:var(--red);color:#2a0b0a}
@keyframes shake{10%,90%{transform:translateX(-2px)}30%,70%{transform:translateX(5px)}50%{transform:translateX(-6px)}}
.explain{margin-top:16px;border-left:3px solid var(--bc,var(--gold));background:rgba(255,255,255,.04);
  padding:12px 14px;border-radius:0 10px 10px 0;font-size:.9rem;color:#dbe3f5;animation:enter .35s both}
.explain b{color:var(--gold)}
.row-actions{display:flex;justify-content:space-between;align-items:center;margin-top:18px;gap:12px}
.btn{background:var(--gold);color:#241802;border:none;border-radius:11px;padding:12px 22px;font-weight:700;
  font-family:var(--sans);cursor:pointer;font-size:.95rem;transition:transform .15s,filter .15s}
.btn:hover{transform:translateY(-2px);filter:brightness(1.05)}
.btn.ghost{background:var(--surface2);color:var(--text);border:1px solid var(--line)}
.feedline{font-weight:600;font-size:.9rem}
.feedline.ok{color:var(--green)} .feedline.no{color:var(--red)}

.result{text-align:center;padding:30px 22px}
.result .big{font-family:var(--serif);font-size:3.4rem;font-weight:700;line-height:1}
.result .grade{font-family:var(--serif);font-size:1.5rem;margin:6px 0 4px}
.result p{color:var(--muted);margin-bottom:20px}
.result .btn{margin:6px}
.spark{font-size:2.2rem;animation:pop .6s cubic-bezier(.2,1.6,.4,1) both}
@keyframes pop{from{transform:scale(0) rotate(-30deg);opacity:0}to{transform:none;opacity:1}}

/* flashcards */
.deck-toggle{display:flex;gap:8px;margin-bottom:14px}
.dt{flex:1;background:var(--surface2);border:1px solid var(--line);color:var(--muted);border-radius:11px;
  padding:10px;cursor:pointer;font-family:var(--sans);font-weight:600;font-size:.85rem;transition:.15s}
.dt.active{color:var(--text);border-color:var(--bc,var(--gold));background:color-mix(in srgb,var(--bc,var(--gold)) 12%,var(--surface2))}
.dt:hover{color:var(--text)}
.fc-scene{perspective:1400px;margin:6px 0 6px}
.fc{position:relative;width:100%;min-height:260px;transform-style:preserve-3d;
  transition:transform .6s cubic-bezier(.3,.8,.3,1);cursor:pointer}
.fc.flip{transform:rotateY(180deg)}
.fc-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:18px;padding:26px;
  display:flex;flex-direction:column;justify-content:center;border:1px solid var(--line);box-shadow:var(--shadow)}
.fc-front{background:linear-gradient(160deg,var(--surface2),var(--surface))}
.fc-back{background:linear-gradient(160deg,rgba(244,189,99,.12),var(--surface));transform:rotateY(180deg);border-color:rgba(244,189,99,.3)}
.fc-face .tag{font-size:.72rem;color:var(--bc,var(--gold));text-transform:uppercase;letter-spacing:.14em;margin-bottom:12px}
.fc-front .txt{font-family:var(--serif);font-size:1.45rem;font-weight:700;line-height:1.25;color:#f4f8ff}
.fc-back .txt{font-size:1.02rem;line-height:1.5;color:#e7ecf8}
.fc-note{display:flex;gap:9px;align-items:flex-start;margin-top:14px;padding:12px 14px;
  background:rgba(122,140,255,.08);border:1px solid var(--line);border-radius:12px;
  color:#c9d3ec;font-size:.86rem;line-height:1.45}
.fc-note .bulb{flex:none;font-size:.95rem;line-height:1.4}
.fc-note b{color:var(--gold)}
.fc-hint{text-align:center;color:var(--muted);font-size:.78rem;margin-top:12px}
.fc-nav{display:flex;align-items:center;justify-content:space-between;margin-top:14px;gap:10px}
.iconbtn{background:var(--surface2);border:1px solid var(--line);color:var(--text);width:44px;height:44px;
  border-radius:12px;cursor:pointer;font-size:1.1rem;transition:.15s}
.iconbtn:hover{border-color:var(--line2);transform:translateY(-2px)}
.fc-mark{display:flex;gap:8px}
.mk{border:1px solid var(--line);background:var(--surface2);color:var(--text);border-radius:10px;
  padding:9px 14px;cursor:pointer;font-family:var(--sans);font-size:.85rem;font-weight:600;transition:.15s}
.mk.know:hover{border-color:var(--green);color:var(--green)}
.mk.again:hover{border-color:var(--gold);color:var(--gold)}
.counter{text-align:center;color:var(--muted);font-size:.82rem;margin-top:6px}

.oral-q{font-family:var(--serif);font-size:1.5rem;font-weight:600;line-height:1.25;margin:6px 0 4px}
.oral-say{color:var(--muted);font-size:.85rem;margin-bottom:18px}
.reveal{overflow:hidden;max-height:0;opacity:0;transition:max-height .5s ease,opacity .4s}
.reveal.open{max-height:640px;opacity:1;margin-top:6px}
.reveal .model{background:rgba(255,255,255,.04);border:1px solid var(--line);border-left:3px solid var(--bc,var(--gold));
  border-radius:0 12px 12px 0;padding:16px;font-size:.95rem;line-height:1.55;color:#e7ecf8}
.reveal .model .lbl{color:var(--gold);font-weight:600;font-size:.76rem;text-transform:uppercase;letter-spacing:.12em;display:block;margin-bottom:8px}

.picker{display:grid;gap:10px}
.pick{display:flex;align-items:center;gap:12px;background:var(--surface2);border:1px solid var(--line);
  border-radius:12px;padding:13px 15px;cursor:pointer;color:var(--text);text-align:left;font-family:var(--sans);transition:.15s}
.pick:hover{transform:translateX(3px);border-color:var(--line2)}
.pick .dot{width:12px;height:12px;border-radius:50%;flex:none;background:var(--bc,var(--gold))}
.pick .alldot{background:conic-gradient(from 0deg,var(--gold),#e8734a,#b07de0,#6d8bff,var(--gold))}
.pick b{font-size:.95rem} .pick small{color:var(--muted);display:block;font-size:.78rem}
.pick .spacer{flex:1}

.confetti{position:fixed;top:-12px;width:9px;height:14px;border-radius:2px;z-index:50;pointer-events:none;animation:fall linear forwards}
@keyframes fall{to{transform:translateY(105vh) rotate(720deg);opacity:.9}}
@media (prefers-reduced-motion: reduce){*{animation-duration:.001s!important;transition-duration:.05s!important}.fc{transition:transform .2s}}
.foot{text-align:center;color:var(--muted);font-size:.74rem;margin-top:30px}

/* --- easter-egg: gracze i motywy --- */
.players{display:flex;gap:9px;justify-content:center;align-items:center;margin-top:12px}
.players .cap{color:var(--muted);font-size:.72rem;margin-right:4px}
.pl{width:44px;height:44px;border-radius:50%;border:1px solid var(--line);background:var(--surface2);
  color:var(--muted);font-weight:700;font-size:.95rem;cursor:pointer;transition:.16s;font-family:var(--sans);
  display:grid;place-items:center;overflow:hidden;padding:0}
.pl:hover{transform:translateY(-2px) scale(1.07);color:var(--text);border-color:var(--line2)}
.pl.on{outline:2px solid var(--gold);outline-offset:2px;box-shadow:0 6px 18px -6px rgba(0,0,0,.5)}
.pl img{width:100%;height:100%;object-fit:cover;display:block}
.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);
  background:var(--surface2);border:1px solid var(--line2);color:var(--text);padding:11px 18px;
  border-radius:999px;font-size:.9rem;font-weight:600;opacity:0;pointer-events:none;transition:.35s;z-index:60;box-shadow:var(--shadow)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* PRIDE (Maciek) — WIELKA flaga + totalny przaśny vibe */
body.theme-pride{--bg:#12081f;--bg2:#0d0618;--surface:rgba(41,23,70,.84);--surface2:rgba(55,32,94,.86);
  --line:rgba(255,255,255,.14);--line2:rgba(255,255,255,.26);--text:#fff2fb;--muted:#e6c9f4;--gold:#ff3d9a;background:#12081f}
body.theme-pride::before{content:"";position:fixed;inset:-8% -8%;z-index:0;pointer-events:none;
  background:linear-gradient(180deg,#e40303 0 16.66%,#ff8c00 16.66% 33.33%,#ffed00 33.33% 50%,#008026 50% 66.66%,#004dff 66.66% 83.33%,#750787 83.33% 100%);
  opacity:.34;animation:flagwave 7s ease-in-out infinite}
body.theme-pride::after{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(120% 85% at 50% 50%,transparent 26%,rgba(18,8,31,.62) 100%)}
@keyframes flagwave{0%,100%{transform:skewY(-1.6deg) scale(1.08)}50%{transform:skewY(1.6deg) scale(1.08)}}
body.theme-pride .wrap{position:relative;z-index:1}
body.theme-pride .panel,body.theme-pride .overall,body.theme-pride .book,body.theme-pride .mode{backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px)}
body.theme-pride .mark{background:conic-gradient(from 0deg,#ff2d95,#ff8c00,#ffed00,#008026,#004dff,#750787,#ff2d95);animation:spin 5s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
body.theme-pride .brand b,body.theme-pride .hero h1 em,body.theme-pride .result .big,body.theme-pride .q{
  background:linear-gradient(90deg,#e40303,#ff8c00,#ffed00,#008026,#004dff,#750787);
  -webkit-background-clip:text;background-clip:text;color:transparent}
body.theme-pride .hero h1{text-shadow:0 2px 34px rgba(255,45,149,.35)}
body.theme-pride .hero p:after{content:" 🌈✨💅🦄"}
body.theme-pride .btn{background:linear-gradient(90deg,#ff2d95,#ff8c00,#004dff);color:#fff;box-shadow:0 8px 26px -8px rgba(255,45,149,.65)}
body.theme-pride .foot:after{content:" · 🏳️‍🌈 100% GEJ EDITION 🏳️‍🌈"}

/* EMO / UNDERGROUND (Wiktoria) — maksymalny mrok */
body.theme-emo{--bg:#040405;--bg2:#000;--surface:#0e0d11;--surface2:#161318;
  --line:rgba(255,255,255,.06);--line2:rgba(255,255,255,.12);--text:#e8e3ee;--muted:#938c9c;
  --gold:#b3122f;--green:#7a4dff;--red:#ff1f4b;background:#040405}
body.theme-emo::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(120% 80% at 50% -10%,rgba(122,77,255,.10),transparent 45%),radial-gradient(120% 90% at 50% 120%,rgba(179,18,47,.14),transparent 50%),radial-gradient(135% 100% at 50% 45%,transparent 36%,rgba(0,0,0,.95) 100%),repeating-linear-gradient(0deg,rgba(255,255,255,.028) 0 1px,transparent 1px 3px)}
body.theme-emo .wrap{position:relative;z-index:1}
body.theme-emo .brand b,body.theme-emo .hero h1,body.theme-emo .q,body.theme-emo .fc-front .txt,body.theme-emo .oral-q{letter-spacing:.4px}
body.theme-emo .fc-front .txt{color:#f6f1fa;text-shadow:0 1px 3px rgba(0,0,0,.75)}
body.theme-emo .fc-hint,body.theme-emo .counter{color:#9a93a4}
body.theme-emo .mark{background:conic-gradient(from 0deg,#b3122f,#1a0710,#7a4dff,#000,#b3122f);animation:flick 3.4s steps(2) infinite}
@keyframes flick{0%,94%,100%{opacity:1}95%{opacity:.35}96%{opacity:.85}97%{opacity:.5}}
body.theme-emo .brand b{color:#ff1f4b;text-shadow:0 0 10px rgba(255,31,75,.5)}
body.theme-emo .hero h1 em{color:#ff1f4b;text-shadow:0 0 26px rgba(255,31,75,.6),0 0 4px rgba(255,31,75,.9);animation:redpulse 3s ease-in-out infinite}
@keyframes redpulse{0%,100%{opacity:.78}50%{opacity:1}}
body.theme-emo .btn{background:#b3122f;color:#fff;box-shadow:0 0 20px -4px rgba(179,18,47,.75)}
body.theme-emo .foot:after{content:" · underground edition †"}

/* efekty spadających/unoszących się emoji */
.fx{position:fixed;z-index:55;pointer-events:none;will-change:transform,opacity}
@keyframes fxUp{0%{transform:translateY(0) rotate(0);opacity:0}12%{opacity:1}100%{transform:translateY(-112vh) rotate(360deg);opacity:0}}
@keyframes fxDown{0%{transform:translateY(0) rotate(0);opacity:0}12%{opacity:.95}100%{transform:translateY(120vh) rotate(200deg);opacity:0}}

/* --- wersja mobilna --- */
@media(max-width:640px){
  .wrap{padding:16px 13px 84px}
  .topbar{gap:9px;margin-bottom:20px}
  .hero h1{font-size:1.72rem}
  .hero p{font-size:.92rem}
  .overall{padding:14px;gap:13px}
  .modes{gap:9px;margin:16px 0 22px}
  .mode{padding:13px 12px}
  .mode b{font-size:.92rem}
  .panel{padding:17px 15px}
  .q,.oral-q{font-size:1.2rem}
  .opt{padding:13px 14px 13px 44px;font-size:.92rem}
  .fc-face{padding:22px 19px}
  .fc-front .txt{font-size:1.26rem}
  .fc{min-height:230px}
  .deck-toggle{flex-wrap:wrap}
  .dt{flex:1 1 30%;font-size:.8rem;padding:9px 6px}
  .players{flex-wrap:wrap;gap:8px}
  .row-actions{flex-direction:column-reverse;align-items:stretch}
  .row-actions .btn{width:100%}
}
@media(max-width:400px){
  .brand span{display:none}
  .hero h1{font-size:1.5rem}
  .stat{font-size:.75rem;padding:5px 9px}
  .result .big{font-size:2.7rem}
  .pl{width:40px;height:40px}
}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="brand" onclick="go('home')">
      <div class="mark"></div>
      <div><b>Obrona&nbsp;100%</b><span>9 lektur · Dziennikarstwo i Nowe Media</span></div>
    </div>
    <div class="spacer"></div>
    <div class="stat" id="streakStat" style="display:none">🔥 seria <b id="streakN">0</b></div>
    <div class="stat">⭐ <b id="ptsN">0</b> pkt</div>
  </div>
  <div id="app"></div>
  <div class="foot">Wskazówka dla wzrokowca: kolory to lektury. Odpowiadaj <b>na głos</b>, zanim klikniesz.</div>
  <div class="players">

{id:0,title:"O tyranii",author:"Timothy Snyder",c:"#ef7f4c",
 teza:"Demokracja nie jest dana raz na zawsze — upada też stopniowo, przez bierność, propagandę i osłabianie instytucji.",
 terms:[
  {q:"Uprzedzające posłuszeństwo",a:"Ludzie sami domyślają się oczekiwań władzy i ograniczają swoją wolność, zanim ktokolwiek ich do tego zmusi.",note:"Ulubiony przykład komisji: urzędnicy i sędziowie III Rzeszy dostosowywali się bez rozkazu."},
  {q:"Postprawda",a:"Stan, w którym fakty przestają decydować, a ludzie kierują się emocjami, przekonaniami i tożsamością.",note:"To nie to samo co kłamstwo — chodzi o obojętność wobec prawdy. Stąd „przedfaszyzm”."},
  {q:"Społeczeństwo obywatelskie",a:"Aktywni obywatele, organizacje pozarządowe i niezależne media działające niezależnie od państwa.",note:"Snyder widzi w nim najlepszą barierę chroniącą przed tyranią."},
  {q:"Instytucje",a:"Sądy, parlament, samorządy, wolne media, uczelnie — filary demokracji, które same się nie obronią.",note:"Autorytaryzm ich nie likwiduje — podporządkowuje je, zostawiając fasadę."}
 ],
 quiz:[
  {q:"Do jakich dwóch ustrojów totalitarnych odwołuje się Snyder?",o:["Faszyzm włoski i frankizm","Nazizm i stalinizm","Maoizm i nazizm","Frankizm i stalinizm"],a:1,e:"Nazizm w Niemczech (Hitler) i stalinizm w ZSRR (Stalin) — analizuje ich mechanizmy."},
  {q:"Co oznacza „uprzedzające posłuszeństwo”?",o:["Wykonywanie rozkazów przełożonych","Ludzie sami ograniczają wolność, zanim władza ich zmusi","Głosowanie na partię władzy","Cenzura prewencyjna mediów"],a:1,e:"Anticipatory obedience: ludzie domyślają się oczekiwań władzy i sami się dostosowują."},
  {q:"Dokończ: „Postprawda jest ___”.",o:["kłamstwem","propagandą","przedfaszyzmem","postmodernizmem"],a:2,e:"Rezygnacja z prawdy poprzedza rezygnację z wolności — to grunt dla autorytaryzmu."},
  {q:"Dlaczego Snyder radzi czytać książki?",o:["Uczą samodzielnego myślenia i odporności na manipulację","Bo są tańsze niż internet","Bo zawierają tylko prawdę","Bo są szybsze niż telewizja"],a:0,e:"Media elektroniczne premiują emocje i skróty; książki chronią krytyczne myślenie."}
 ],
 cards:[
  {q:"Kim jest Timothy Snyder?",a:"Amerykański historyk z Yale, badacz totalitaryzmów XX w. i Holokaustu.",note:"Podkreśl: pisze jako historyk oparty na źródłach, nie publicysta — to dodaje wagi."},
  {q:"Główna teza „O tyranii”?",a:"Demokracja bywa niszczona stopniowo — przez bierność obywateli, propagandę i osłabianie instytucji, nie tylko przez zamach stanu.",note:"To zdanie warto powiedzieć na start każdej odpowiedzi o Snyderze."},
  {q:"Najważniejsza lekcja książki?",a:"„Nie bądź z góry posłuszny” — tyrania rośnie, gdy ludzie sami rezygnują z wolności.",note:"Jeśli padnie „która lekcja najważniejsza” — to ta."},
  {q:"Lekcja wprost dla dziennikarzy?",a:"„Pamiętaj o etyce zawodowej” — propaganda potrzebuje dziennikarzy, represje sędziów.",note:"Twój as na kierunku dziennikarskim — łączy książkę z zawodem."}
 ],
 oral:[
  {q:"Rozwiń tezę, że „postprawda jest przedfaszyzmem”.",a:"Gdy fakty przestają się liczyć, a rządzą emocje i tożsamość, ludzie tracą wspólny grunt prawdy. Bez prawdy nie da się kontrolować władzy — to gleba, na której wyrasta autorytaryzm. Dlatego rezygnacja z prawdy poprzedza rezygnację z wolności."},
  {q:"Na czym polega indywidualna odpowiedzialność w obronie demokracji? Podaj kilka rad.",a:"Nie bądź z góry posłuszny; broń instytucji; kieruj się etyką zawodową; dbaj o język; wierz w prawdę i bądź dociekliwy; wyróżniaj się; rozmawiaj z ludźmi; bądź patriotą i odważny."}
 ]},
{id:1,title:"Oblężona demokracja",author:"Jacek Żakowski",c:"#e05a8a",
 teza:"Demokracja jest „oblężona” — osłabiana stopniowo przez technologię, social media, populizm i nierówności, a nie przez klasyczny zamach stanu.",
 terms:[
  {q:"Demokratura",a:"Hybryda ustrojowa: zachowuje fasadę demokracji (wybory, parlament), ale realnie ogranicza wolności i podporządkowuje media oraz sądy.",note:"Groźniejsza od zamachu stanu, bo legitymizuje się wyborami i „wolą ludu”."},
  {q:"Populizm",a:"Polityka dzieląca społeczeństwo na „czysty lud” i „skorumpowane elity”, grająca na emocjach i prostych rozwiązaniach.",note:"To samo pojęcie wraca u Zielonki — idealne do pytań „porównaj autorów”."},
  {q:"Gatekeeping (strażnicy informacji)",a:"Rola tradycyjnych mediów, które selekcjonowały i weryfikowały informacje, zanim trafiły do odbiorcy.",note:"Ich kryzys otworzył drzwi dezinformacji i treściom bez weryfikacji."},
  {q:"Mikrotargetowanie",a:"Kierowanie spersonalizowanych, emocjonalnych przekazów do wyborców na podstawie ich danych.",note:"Hasło-klucz: Cambridge Analytica. Podważa uczciwość wyborów."}
 ],
 quiz:[
  {q:"Czym jest „demokratura”?",o:["Demokracja bezpośrednia w internecie","Hybryda: fasada demokracji przy realnym ograniczaniu wolności","Dyktatura wojskowa","Demokracja bez partii politycznych"],a:1,e:"Zachowuje wybory i parlament, ale podporządkowuje media i sądy — trudniejsza do rozpoznania."},
  {q:"Czego dotyczyła afera Cambridge Analytica?",o:["Wycieku haseł bankowych","Mikrotargetowania wyborców na podstawie ich danych","Cenzury na Facebooku","Fałszowania kart do głosowania"],a:1,e:"Profilowanie z danych i podawanie spersonalizowanych, manipulacyjnych przekazów — omija racjonalną debatę."},
  {q:"Kim byli „gatekeeperzy” w tradycyjnych mediach?",o:["Strażnicy/selekcjonerzy informacji","Cenzorzy państwowi","Moderatorzy forów","Właściciele koncernów"],a:0,e:"Media selekcjonowały informacje; ich kryzys otworzył drogę dezinformacji i populizmowi."},
  {q:"Jaką formę ma książka?",o:["Monografia naukowa","Zbiór rozmów z intelektualistami","Pamiętnik","Powieść"],a:1,e:"To wywiady Żakowskiego z badaczami demokracji, mediów i ekonomii."}
 ],
 cards:[
  {q:"Główna teza „Oblężonej demokracji”?",a:"Demokracja jest osłabiana stopniowo — social media, populizm, spadek zaufania, nierówności — a nie przez zamach stanu.",note:"To zdanie tłumaczy sam tytuł: „oblężona”, czyli powoli osaczana."},
  {q:"Dlaczego demokratura jest groźna?",a:"Legitymizuje się wyborami i „wolą ludu”, więc trudniej ją rozpoznać niż klasyczny przewrót.",note:"Kontrast: czołgi widać od razu, demokraturę dostrzega się za późno."},
  {q:"Rola wolnych mediów i niezależnych sądów?",a:"Media kontrolują władzę (IV władza), sądy chronią prawa jednostki; autorytaryzm zaczyna od przejęcia jednych i drugich.",note:"Motyw przekrojowy — wspólny ze Snyderem i Zielonką."}
 ],
 oral:[
  {q:"Skąd wzięły się kłopoty z demokracją? Podaj przykłady rozmówców.",a:"Rewolucja technologiczna i social media, kryzys tradycyjnych mediów (upadek gatekeeperów), spadek zaufania do elit, globalizacja, rosnące nierówności oraz emocje wypierające debatę opartą na faktach."}
 ]},
{id:2,title:"Dżihad kontra McŚwiat",author:"Benjamin Barber",c:"#b07de0",
 teza:"Świat rozrywają dwie siły — plemienny partykularyzm (Dżihad) i globalny kapitalizm/kultura masowa (McŚwiat); obie zagrażają demokracji.",
 terms:[
  {q:"Dżihad (u Barbera)",a:"Metafora wszystkich ruchów, które odrzucają globalizację i zamykają się we własnej tożsamości: plemienność, fundamentalizm, nacjonalizm.",note:"Uwaga: nie mylić ze znaczeniem religijnym — komisja lubi to sprawdzać."},

  {q:"Homogenizacja kultury",a:"Ujednolicanie stylów życia i gustów pod wpływem globalnych marek i mediów.",note:"To efekt McŚwiata — przeciwieństwo plemiennej odrębności Dżihadu."}
 ],
 quiz:[
  {q:"Co oznacza „Dżihad” u Barbera?",o:["Święta wojna islamu","Ruchy odrzucające globalizację i zamykające się w tożsamości","Terroryzm","Ekspansję McŚwiata"],a:1,e:"To metafora plemienności, fundamentalizmu i nacjonalizmu — nie dosłowny dżihad religijny."},
  {q:"„McŚwiat” to metafora czego?",o:["Sieci McDonald's","Globalnego kapitalizmu i kultury masowej","Polityki USA","Internetu"],a:1,e:"Ujednolicenie świata przez marki i konsumpcję; McDonald's jest tylko symbolem."},
  {q:"Co łączy Dżihad i McŚwiat według Barbera?",o:["Oba wspierają demokrację","Oba zagrażają demokracji","Oba są religijne","Oba są amerykańskie"],a:1,e:"Dżihad demokrację odrzuca, McŚwiat ją pomija na rzecz rynku."},
  {q:"Co dosłownie znaczy „dżihad” w islamie?",o:["Święta wojna","Zmaganie/wysiłek (głównie wewnętrzny)","Pielgrzymka","Post"],a:1,e:"Utożsamianie go z wojną/terrorem to duże uproszczenie."}
 ],
 cards:[
  {q:"Jaki jest symbol McŚwiata?",a:"McDonald's, a szerzej Coca-Cola, Hollywood, MTV — globalne marki i kultura masowa.",note:"Łatwo zapamiętać jako cztery globalne marki-ikony."},
  {q:"Dżihad — plusy i minusy?",a:"(+) chroni tożsamość, tradycje, buduje wspólnotę. (−) zamknięcie, nietolerancja, fanatyzm, przemoc.",note:"Zawsze podawaj OBIE strony — Barber nie jest jednostronny."},
  {q:"McŚwiat — plusy i minusy?",a:"(+) rozwój gospodarczy i naukowy, komunikacja, otwartość. (−) konsumpcjonizm, utrata tożsamości, władza korporacji.",note:"Symetria z Dżihadem robi dobre wrażenie na komisji."},
  {q:"K-pop jako przykład?",a:"Zarazem McŚwiat (globalny produkt kultury masowej) i trochę Dżihad (plemienna, zamknięta tożsamość fandomu).",note:"Twój gotowy przykład na pytanie „odnieś do konkretu”."}
 ],
 oral:[
  {q:"Czy to, co porównuje Barber (McŚwiat i Dżihad), można odnieść do k-popu? Jak to widzisz?",a:"Tak. K-pop to typowy McŚwiat: globalny, ujednolicony produkt kultury masowej z potężną machiną marketingową i tymi samymi formatami na całym świecie. Ale ma też rys Dżihadu: fandom tworzy silną, plemienną tożsamość, własny język, rytuały i zamkniętą wspólnotę. Pokazuje to, że obie Barberowskie siły działają dziś jednocześnie, często przez ten sam internet."},
  {q:"Jakie zmiany kulturowe McŚwiata widać w Polsce?",a:"Te same globalne marki, galerie handlowe, seriale i fast foody; angielski w reklamie i kulturze młodzieżowej; styl życia oparty na konsumpcji. Równolegle trwa reakcja typu Dżihad — akcent na tradycję, religię i tożsamość narodową."}
 ]},
{id:3,title:"Kontrrewolucja",author:"Jan Zielonka",c:"#6d8bff",
 teza:"Europa nie odrzuca demokracji, lecz sposób, w jaki działała demokracja liberalna — trwa „kontrrewolucja” przeciw liberalizmowi.",
 terms:[
  {q:"Liberalizm",a:"Nurt polityczny i filozoficzny, którego celem jest ochrona wolności jednostki i ograniczenie nadmiernej ingerencji państwa.",note:"Rdzeń do zapamiętania: wolność jednostki + rządy prawa."},
  {q:"Demokracja liberalna",a:"Władza większości połączona z ochroną praw jednostki i mniejszości oraz z praworządnością.",note:"Różnica: demokracja = rządy większości; liberalizm = granice, których większość nie może przekroczyć."},
  {q:"Kontrrewolucja",a:"Reakcja przeciw wcześniejszym zmianom — tu: bunt przeciw liberalnemu porządkowi w Europie.",note:"„Zdrada ideałów” = liberalizm nie został zrealizowany zgodnie z własnymi zasadami."},
  {q:"Populizm",a:"Polityka „lud kontra elity”, grająca na emocjach i uproszczeniach.",note:"Wspólne z Żakowskim — świetny punkt do porównania autorów."}
 ],
 quiz:[
  {q:"Jaka jest główna teza Zielonki?",o:["Europa odrzuca demokrację","Europa odrzuca sposób działania demokracji liberalnej","Liberalizm zwyciężył ostatecznie","Europa wraca do komunizmu"],a:1,e:"Bunt kieruje się nie przeciw demokracji, lecz przeciw liberalnemu jej wariantowi."},
  {q:"Co oznacza „zdrada liberalnych ideałów”?",o:["Liberalizm jest z natury zły","Liberalizm nie był realizowany zgodnie z własnymi zasadami","Zdradzili go populiści","Zdradę popełniły media"],a:1,e:"Nierówności i arogancja elit sprawiły, że liberalizm rozminął się z własnymi ideałami."},
  {q:"Populizm dzieli świat na:",o:["Bogatych i biednych","„Czysty lud” i „skorumpowane elity”","Lewicę i prawicę","Wierzących i ateistów"],a:1,e:"Odwołuje się do emocji i prostych rozwiązań, przeciwstawiając „lud” elitom."},
  {q:"Co demokracja liberalna dodaje do „zwykłej” demokracji?",o:["Gospodarkę planową","Ochronę praw jednostki i mniejszości + praworządność","Jednopartyjność","Cenzurę"],a:1,e:"Nawet większość nie może dowolnie ograniczać wolności jednostki."}
 ],
 cards:[
  {q:"Kim jest Jan Zielonka?",a:"Polsko-brytyjski politolog związany z Oksfordem.",note:"Krótka nota o autorze zwykle wystarcza — komisja skupia się na tezie."},
  {q:"Przykłady populizmu?",a:"Orbán (Węgry), Trump (USA), Brexit, ruchy we Włoszech, Francji, Polsce.",note:"Miej 2–3 przykłady w gotowości — pytanie prawie na pewno padnie."},
  {q:"Co ciekawe w jego tezie?",a:"Nie broni bezkrytycznie liberalizmu — obarcza go współwiną za własny kryzys.",note:"To dobry punkt na „czy się zgadzasz” — możesz przyznać rację lub polemizować."}
 ],
 oral:[
  {q:"Co to jest liberalizm i czym jest demokracja liberalna?",a:"Liberalizm to nurt chroniący wolność jednostki i ograniczający ingerencję państwa (rządy prawa, wolność słowa, prawa jednostki). Demokracja liberalna to władza większości połączona z ochroną praw jednostki i mniejszości oraz z praworządnością — większość nie może wszystkiego."}
 ]},
{id:4,title:"Polska 1939–1989",author:"Andrzej Friszke",c:"#d94b45",
 teza:"Dzieje Polski to historia utraty i odzyskiwania suwerenności — monopol władzy komunistów przełamywany przez opór społeczny aż do 1989.",
 terms:[
  {q:"Monopol władzy w PRL",a:"PZPR kontrolowała politykę (jedna partia, cenzura, SB), gospodarkę (plan centralny), kulturę i media; na zewnątrz — zależność od ZSRR.",note:"Wylicz 4–5 sfer (polityka, gospodarka, kultura, prawa człowieka, polityka zagraniczna) — komisja to lubi."},
  {q:"„Solidarność”",a:"Masowy, pokojowy ruch społeczny (ok. 10 mln) powstały po strajkach i porozumieniach sierpniowych 1980.",note:"Data do zapamiętania: sierpień 1980."},
  {q:"Stan wojenny",a:"Wprowadzony 13 XII 1981 przez gen. Jaruzelskiego; delegalizacja Solidarności, internowania, ofiary (kopalnia „Wujek”).",note:"Friszke nazywa to „kontrrewolucją generałów”."},
  {q:"Okrągły Stół",a:"Negocjacje władzy z opozycją (1989), które doprowadziły do częściowo wolnych wyborów.",note:"Ścieżka: Okrągły Stół → wybory 4 VI 1989 → rząd Mazowieckiego."}
 ],
 quiz:[
  {q:"Kiedy powstała „Solidarność”?",o:["Czerwiec 1976","Sierpień 1980","Grudzień 1981","Czerwiec 1989"],a:1,e:"Po strajkach i porozumieniach sierpniowych 1980 — masowy, pokojowy ruch (ok. 10 mln)."},
  {q:"Co wydarzyło się 13 grudnia 1981?",o:["Okrągły Stół","Wprowadzenie stanu wojennego","Wybory czerwcowe","Powstanie KOR"],a:1,e:"Gen. Jaruzelski wprowadza stan wojenny, delegalizuje Solidarność — kontrrewolucja generałów."},
  {q:"Kiedy odbyły się pierwsze częściowo wolne wybory?",o:["1980","1981","4 czerwca 1989","1990"],a:2,e:"Miażdżące zwycięstwo Solidarności; początek końca PRL."},
  {q:"Kto był pierwszym niekomunistycznym premierem?",o:["Lech Wałęsa","Tadeusz Mazowiecki","Wojciech Jaruzelski","Bronisław Geremek"],a:1,e:"Rząd Mazowieckiego (1989) — narodziny III RP."}
 ],
 cards:[
  {q:"Na czym polegał monopol władzy w PRL?",a:"PZPR kontrolowała politykę (jedna partia, cenzura, SB), gospodarkę (plan centralny), kulturę i media; na zewnątrz — zależność od ZSRR.",note:"Ustrukturyzuj po sferach — brzmi jak gotowa odpowiedź egzaminacyjna."},
  {q:"Jak doszło do zmiany w 1989?",a:"Kryzys gospodarczy + „pieriestrojka” Gorbaczowa → strajki 1988 → Okrągły Stół → wybory 4 VI 1989 → rząd Mazowieckiego.",note:"Zapamiętaj jako łańcuch przyczynowo-skutkowy, nie luźne fakty."},
  {q:"Jak oceniać transformację 1989?",a:"(+) pokojowość, wolność, powrót do Europy. (−) „gruba kreska”, brak rozliczeń, bolesne koszty społeczne.",note:"To pytanie pada wprost — miej gotowe obie strony i wyważoną konkluzję."}
 ],
 oral:[
  {q:"Jak oceniasz zmiany ustrojowe 1989 roku i jak one wyglądały?",a:"Przebieg: kryzys i pieriestrojka → strajki 1988 → Okrągły Stół → częściowo wolne wybory 4 VI 1989 (zwycięstwo Solidarności) → rząd Mazowieckiego, koniec PRL. Ocena: to wielki sukces — pokojowa, negocjowana zmiana i odzyskanie wolności, wzór dla regionu. Ale okupiony kosztami: „grubą kreską” i brakiem rozliczeń oraz trudną transformacją gospodarczą (bezrobocie, likwidacja zakładów). Konkluzja: sukces z realnymi, niedokończonymi kosztami."}
 ]},
{id:5,title:"Płynna nowoczesność",author:"Zygmunt Bauman",c:"#33b4c2",
 teza:"Współczesność weszła w fazę „płynną” — nic nie jest trwałe; instytucje, więzi i tożsamości stają się tymczasowe.",
 terms:[
  {q:"Nowoczesność",a:"Epoka oparta na wierze w postęp, naukę, technikę i racjonalną organizację; dążenie do porządku i przewidywalności.",note:"Faza „ciężka/stała”: trwałe instytucje, stałe zatrudnienie, przewidywalne życie."},
  {q:"Płynna nowoczesność",a:"Faza współczesności, w której nic nie jest trwałe — dominują zmiana, niepewność, tymczasowość i indywidualizacja.",note:"Metafora płynu: nie zachowuje kształtu, ciągle się zmienia."},
  {q:"Konsumpcja jako religia",a:"Tożsamość i sens budowane przez konsumpcję; obiecuje szczęście, ma „świątynie” (centra handlowe), rytuały i wyznawców.",note:"Kluczowa uwaga: jest nigdy niezaspokojona — to napędza całość."},
  {q:"Indywidualizacja",a:"Przerzucenie odpowiedzialności za własny los na jednostkę, kosztem trwałych wspólnot.",note:"Efekt płynności — trudniej o solidarność i długofalowe zaangażowanie."}
 ],
 quiz:[
  {q:"Co oznacza „płynna nowoczesność”?",o:["Epokę kryzysu klimatycznego","Społeczeństwo, w którym nic nie jest trwałe","Płynność finansową gospodarki","Nowoczesność technologiczną"],a:1,e:"Dominują zmiana, niepewność, tymczasowość i indywidualizacja."},
  {q:"Dlaczego Bauman używa słowa „płynna”?",o:["Bo świat tonie","Bo płyn nie zachowuje kształtu i ciągle się zmienia","Bo woda daje życie","Bo płyn jest przezroczysty"],a:1,e:"Metafora płynu: brak trwałej formy, ciągła zmiana."},
  {q:"Do czego Bauman porównuje konsumpcję?",o:["Do pracy","Do religii","Do wojny","Do nauki"],a:1,e:"Obiecuje szczęście, ma „świątynie” (centra handlowe), rytuały i wyznawców — a jest nigdy niezaspokojona."},
  {q:"Czym była „ciężka” nowoczesność?",o:["Trwałe instytucje, stałe zatrudnienie, przewidywalność","Era przemysłu ciężkiego","Totalitaryzm","Feudalizm"],a:0,e:"Faza stała: solidne instytucje i przewidywalne życie — przeciwieństwo płynności."}
 ],
 cards:[
  {q:"Czym cechuje się nowoczesność?",a:"Wiarą w postęp, naukę, technikę i racjonalną organizację; dążeniem do porządku i przewidywalności.",note:"Zacznij od tego, zanim przejdziesz do „płynnej” fazy."},
  {q:"Cechy płynnej nowoczesności?",a:"Niepewność, elastyczność, tymczasowość, indywidualizacja; trudniej o trwałe wspólnoty.",note:"Cztery hasła — łatwe do wyliczenia na głos."},
  {q:"Konsumpcja jako religia?",a:"Tożsamość i sens buduje się przez konsumpcję; ma świątynie, rytuały i wyznawców, ale nigdy nie syci.",note:"Efektowny obraz — dobrze brzmi w odpowiedzi ustnej."}
 ],
 oral:[
  {q:"Płynna nowoczesność w kontekście mediów / Twojej pracy — jak to widzisz?",a:"Media są dziś „płynne”: informacja jest ulotna, newsy jednorazowe, uwaga rozproszona, a dziennikarstwo goni za klikalnością zamiast trwałości. Tożsamość odbiorcy buduje się przez media społecznościowe i marki — dokładnie tak, jak Bauman opisuje konsumpcyjne, tymczasowe „ja”. To dobry pomost do tematu nowych mediów."}
 ]},
{id:6,title:"Koniec historii",author:"Francis Fukuyama",c:"#4bb06a",
 teza:"„Koniec historii” to koniec ideologicznej ewolucji — liberalna demokracja z rynkiem jako ostateczna, uniwersalna forma ładu.",
 terms:[
  {q:"Koniec historii",a:"Nie koniec wydarzeń, lecz koniec ideologicznej ewolucji — brak realnej alternatywy dla liberalnej demokracji.",note:"Najczęstsze nieporozumienie: to NIE „koniec świata” ani „koniec wydarzeń”."},
  {q:"Thymos",a:"Potrzeba uznania własnej godności; wg Fukuyamy demokracja liberalna zaspokaja ją najlepiej.",note:"Dobry, „mądrze brzmiący” argument za wyższością demokracji."},
  {q:"Liberalna demokracja (u Fukuyamy)",a:"Ustrój, który autor uznał za docelowy i uniwersalny po upadku komunizmu.",note:"Dziś ta teza jest podważana — miej gotową krytykę."}
 ],
 quiz:[
  {q:"Co oznacza „koniec historii”?",o:["Koniec świata","Koniec ideologicznej ewolucji (nie wydarzeń)","Koniec pisania historii","Koniec wszystkich wojen"],a:1,e:"Nie „nic się już nie wydarzy”, lecz brak realnej alternatywy ideologicznej."},
  {q:"Jaka forma ładu miała być kresem historii?",o:["Komunizm","Liberalna demokracja + gospodarka rynkowa","Teokracja","Socjaldemokracja skandynawska"],a:1,e:"Po upadku komunizmu brakło konkurencyjnej idei uniwersalnej."},
  {q:"Które wydarzenie najsilniej podważa tezę Fukuyamy?",o:["Upadek ZSRR","Zjednoczenie Niemiec","Wojna Rosji przeciw Ukrainie / powrót autorytaryzmów","Powstanie Unii Europejskiej"],a:2,e:"Powrót wielkich konfliktów i autorytaryzmów pokazuje, że historia się nie zakończyła."},
  {q:"Kiedy powstał esej „Koniec historii”?",o:["Podczas II wojny światowej","Tuż po zimnej wojnie, 1989","W 2001","W 2016"],a:1,e:"W momencie triumfu Zachodu — stąd optymizm, dziś podważany."}
 ],
 cards:[
  {q:"Na czym polega wyższość liberalnej demokracji wg Fukuyamy?",a:"Chroni wolność jednostki, uznaje godność człowieka (thymos), rynek sprzyja rozwojowi, system ogranicza przemoc polityczną.",note:"Cztery argumenty — wylicz je po kolei."},
  {q:"Dlaczego teza dziś wydaje się utopijna?",a:"Autorytaryzmy, Chiny jako model, populizm, 11 września, wojna Rosji z Ukrainą — historia się nie skończyła.",note:"To druga połowa każdej dobrej odpowiedzi o Fukuyamie."},
  {q:"Z kim kontrastuje Fukuyama?",a:"Ze Snyderem, Żakowskim, Zielonką — oni pokazują kruchość demokracji, on wierzył w jej trwałość.",note:"Świetny punkt na pytanie „porównaj autorów”."}
 ],
 oral:[
  {q:"O co ogólnie chodziło w książce i czy zgadzasz się z „końcem historii”?",a:"Fukuyama twierdził, że po upadku komunizmu liberalna demokracja z rynkiem to ostateczny, uniwersalny model — koniec ideologicznej ewolucji. W 1989 brzmiało to przekonująco. Moim zdaniem teza była jednak zbyt optymistyczna: demokracja nie jest nieodwracalna, wróciły autorytaryzmy, Chiny oferują alternatywę, są wojny i populizm. Fukuyama trafnie uchwycił moment, ale pomylił chwilowe zwycięstwo z końcem procesu — sam później częściowo skorygował poglądy."}
 ]},
{id:7,title:"Coraz ciemniej",author:"Julia Ebner",c:"#8b95b3",
 teza:"Internet nie stworzył ekstremizmu, ale zmienił sposób jego działania — przyspiesza radykalizację i ułatwia zamknięte społeczności.",
 terms:[
  {q:"Radykalizacja online",a:"Przyspieszony proces przyjmowania skrajnych poglądów w zamkniętych grupach internetowych.",note:"Sedno tezy Ebner: internet zmienił nie istnienie, lecz tempo i mechanikę ekstremizmu."},
  {q:"Bańka informacyjna",a:"Zamknięty obieg treści, które potwierdzają istniejące poglądy i odcinają od innych.",note:"Łączy się ze Snyderowską postprawdą — dobry pomost między lekturami."},
  {q:"Rekrutacja w sieci",a:"Pozyskiwanie nowych członków przez memy, kulturę internetową i pozornie niewinne treści.",note:"Nowość względem dawnych ruchów, które potrzebowały spotkań i liderów."}
 ],
 quiz:[
  {q:"Jaka jest główna teza Ebner?",o:["Internet stworzył ekstremizm","Internet nie stworzył ekstremizmu, ale zmienił jego działanie","Ekstremizm zniknął dzięki sieci","Internet jest całkowicie neutralny"],a:1,e:"Sieć przyspiesza radykalizację i ułatwia tworzenie zamkniętych grup."},
  {q:"Jaką metodą badawczą posłużyła się autorka?",o:["Ankiety telefoniczne","Infiltracja środowisk ekstremistycznych „od środka”","Analiza statystyk policji","Wywiady z politykami"],a:1,e:"Obserwowała te grupy uczestnicząc w ich internetowych przestrzeniach."},
  {q:"Kim jest Julia Ebner?",o:["Austriacka badaczka ekstremizmu (ISD)","Dziennikarka telewizyjna","Polityczka","Programistka"],a:0,e:"Pracowała m.in. w Institute for Strategic Dialogue."}
 ],
 cards:[
  {q:"Jak internet zmienił ekstremizm?",a:"Przyspiesza radykalizację, ułatwia rekrutację i tworzenie zamkniętych społeczności; wykorzystuje algorytmy, bańki i memy.",note:"Podkreśl: nie stworzył ekstremizmu — zmienił jego sposób działania."},
  {q:"Z kim powiązać Ebner na obronie?",a:"Ze Snyderem (postprawda), Żakowskim (social media, populizm) i Baumanem (ulotne wspólnoty online).",note:"Na liście nie ma pytań do Ebner — dlatego powiązania to Twoja amunicja."}
 ],
 oral:[
  {q:"Jak nowe media i internet zmieniają współczesny ekstremizm?",a:"Ebner pokazuje, że internet nie wymyślił ekstremizmu, ale radykalnie zmienił jego mechanikę: dawniej potrzebne były spotkania, liderzy i fizyczna przestrzeń, dziś wystarczą zamknięte grupy online. Algorytmy i bańki informacyjne przyspieszają radykalizację, memy i kultura internetowa służą rekrutacji. To spina się ze Snyderem i Żakowskim — sieć jako nowe narzędzie zagrożeń dla demokracji."}
 ]},
{id:8,title:"Etyka dobromyślności",author:"Tadeusz Gadacz",c:"#dcb642",
 teza:"Sama wiedza nie wystarczy — myślenie musi być połączone z dobrem; to postulat etyczny szczególnie ważny dla dziennikarza.",
 terms:[
  {q:"Dobromyślność",a:"Nastawienie umysłu, w którym człowiek nie tylko chce wiedzieć, ale chce używać wiedzy w sposób służący dobru.",note:"≠ naiwność i bezkrytyczna dobroć — to często sprawdzana pułapka."},
  {q:"Banalność zła (Arendt)",a:"Ogromne zbrodnie mogą być dziełem zwykłych ludzi, którzy przestali samodzielnie myśleć i tylko wykonywali rozkazy.",note:"Klucz do pytania „do jakiej książki nawiązuje tytuł” — Hannah Arendt, „Eichmann w Jerozolimie”."},
  {q:"Odpowiedzialność za słowo",a:"Etyczny fundament pracy dziennikarza — używanie wiedzy i wpływu w służbie prawdy, nie manipulacji.",note:"Twój most od Gadacza do kierunku dziennikarskiego."}
 ],
 quiz:[
  {q:"Co oznacza „dobromyślność” u Gadacza?",o:["Bezkrytyczną dobroć","Myślenie zorientowane na dobro (nie naiwność)","Pozytywne myślenie","Optymizm"],a:1,e:"Człowiek nie tylko chce wiedzieć, ale chce używać wiedzy w służbie dobra."},
  {q:"Do jakiej autorki i książki nawiązuje tytuł?",o:["Do Kanta","Do Hannah Arendt i „banalności zła”","Do Tischnera","Do Arystotelesa"],a:1,e:"„Eichmann w Jerozolimie. Rzecz o banalności zła” — myślenie i odpowiedzialność moralna."},
  {q:"Co oznacza „banalność zła” u Arendt?",o:["Że zło jest nieważne","Zbrodnie zwykłych ludzi, którzy przestali myśleć","Że zło jest wrodzone","Że zło jest medialne"],a:1,e:"Eichmann tłumaczył się rozkazami; groza polega na bezmyślnym wykonawstwie."},
  {q:"„Myślenie bez dobra jest ___, dobro bez myślenia może stać się ___”.",o:["martwe / głuche","puste / ślepe","zimne / gorące","puste / nudne"],a:1,e:"Dopiero połączenie myślenia i dobra daje etyczną mądrość."}
 ],
 cards:[
  {q:"Kim jest Tadeusz Gadacz?",a:"Polski filozof i historyk filozofii.",note:"Krótko o autorze — sedno pytań dotyczy pojęcia dobromyślności."},
  {q:"Co łączy Gadacza i Hannah Arendt?",a:"Namysł nad myśleniem i moralną odpowiedzialnością — Arendt diagnozuje bezmyślność zła, Gadacz proponuje dobromyślność.",note:"To dokładnie odpowiedź na oficjalne pytanie o nawiązanie tytułu."},
  {q:"Most do dziennikarstwa?",a:"Dziennikarz ma wiedzę i wpływ — dobromyślność to używać ich w służbie prawdy i dobra wspólnego, nie manipulacji.",note:"Domknij nią odpowiedź — pokazuje związek lektury z zawodem."}
 ],
 oral:[
  {q:"Rozwiń: „Myślenie bez dobra jest puste, dobro bez myślenia może stać się ślepe”.",a:"Inteligencja bez wartości bywa groźna — można sprawnie myśleć i służyć złu (myślenie „puste”). Z kolei dobre intencje bez namysłu prowadzą do naiwności i błędów (dobro „ślepe”). Dopiero połączenie jednego z drugim daje etyczną mądrość — a dla dziennikarza, odpowiedzialnego za słowo, to warunek uczciwego zawodu."}
 ]}
];

let pts=0, streak=0, bestStreakThisRun=0;
const mastery={};
BOOKS.forEach(b=>mastery[b.id]=0);

// --- zapis postępu w przeglądarce (działa po pobraniu pliku / na hostingu) ---
const SKEY='obrona100_v1';
function saveState(){try{localStorage.setItem(SKEY,JSON.stringify({pts,mastery}));}catch(e){/* np. podgląd bez localStorage */}}
function loadState(){try{const s=JSON.parse(localStorage.getItem(SKEY));if(s){pts=s.pts||0;if(s.mastery)Object.keys(mastery).forEach(k=>{if(typeof s.mastery[k]==='number')mastery[k]=s.mastery[k];});}}catch(e){}}
function resetProgress(){if(!confirm('Wyczyścić zapisany postęp? Tej operacji nie da się cofnąć.'))return;pts=0;streak=0;BOOKS.forEach(b=>mastery[b.id]=0);try{localStorage.removeItem(SKEY);}catch(e){}syncStats();renderHome();}

const app=document.getElementById('app');
const ptsN=document.getElementById('ptsN');
const streakStat=document.getElementById('streakStat');
const streakN=document.getElementById('streakN');
function syncStats(){ptsN.textContent=pts;
  if(streak>0){streakStat.style.display='';streakStat.classList.add('streak-on');streakN.textContent=streak;}
  else{streakStat.classList.remove('streak-on');streakStat.style.display='none';}}
function ring(pct,size=54){const r=(size-8)/2,c=2*Math.PI*r,off=c*(1-pct/100);
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}"><circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="rgba(255,255,255,.1)" stroke-width="6"/><circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="var(--gold)" stroke-width="6" stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${off}" transform="rotate(-90 ${size/2} ${size/2})" style="transition:stroke-dashoffset 1s cubic-bezier(.2,.8,.2,1)"/></svg>`;}
function overallPct(){let done=0,tot=0;BOOKS.forEach(b=>{done+=Math.min(mastery[b.id],b.quiz.length);tot+=b.quiz.length;});return Math.round(done/tot*100);}
function esc(s){return s.replace(/</g,'&lt;');}

function go(where,arg){window.scrollTo({top:0,behavior:'smooth'});
  if(where==='home')return renderHome();
  if(where==='quizPick')return renderPick('quiz');
  if(where==='cardPick')return renderPick('cards');
  if(where==='oralPick')return renderPick('oral');
  if(where==='quiz')return renderQuiz(arg);
  if(where==='cards')return renderCards(arg);
  if(where==='oral')return renderOral(arg);
}
function renderHome(){
  const op=overallPct();
  app.innerHTML=`<div class="screen">
    <div class="hero">
      <h1>Naucz się do obrony <em>grając</em></h1>
      <p>Wszystkie 9 lektur w trzech trybach. Klikaj, obracaj fiszki i ćwicz odpowiedzi na głos — dokładnie w stylu pytań komisji (znaj książkę + miej opinię + podaj przykład).</p>
    </div>
    <div class="overall">
      <div class="ringbox">${ring(op)}<div class="pct">${op}%</div></div>
      <div class="txt"><small>Opanowanie materiału (z quizów)</small><div>${op<20?'Zaczynamy — powodzenia!':op<60?'Idzie dobrze, tak trzymaj':op<100?'Blisko — dopnij słabe lektury':'Komplet! Powtórz przed obroną 💪'}</div></div>
      <div style="flex:1"></div>
      <button class="mk again" onclick="resetProgress()" title="Wyczyść zapisany postęp">↺ Zeruj</button>
    </div>
    <div class="modes">
      <button class="mode" onclick="go('quizPick')"><div class="ic">🎯</div><b>Quiz</b><small>Pytania z odpowiedziami, punkty i seria</small></button>
      <button class="mode" onclick="go('cardPick')"><div class="ic">🔄</div><b>Fiszki</b><small>Zagadnienia i pytania + wskazówka pod każdą</small></button>
      <button class="mode" onclick="go('oralPick')"><div class="ic">🎓</div><b>Tryb obrony</b><small>Mów na głos, potem sprawdź wzór</small></button>
    </div>
    <div class="sect-label">Lektury — kliknij, by od razu przećwiczyć quiz</div>
    <div class="books">${BOOKS.map(b=>{const m=Math.round(Math.min(mastery[b.id],b.quiz.length)/b.quiz.length*100);
      return `<button class="book ${m>=100?'mastered':''}" style="--bc:${b.c}" onclick="go('quiz',${b.id})">
        <div class="done">✓</div><div class="num">0${b.id+1}</div><h3>${b.title}</h3><div class="auth">${b.author}</div>
        <div class="mini"><i style="width:${m}%"></i></div></button>`;}).join('')}</div>
  </div>`;
  requestAnimationFrame(()=>{document.querySelectorAll('.book .mini i').forEach(i=>{const w=i.style.width;i.style.width='0';requestAnimationFrame(()=>i.style.width=w);});});
}

function renderPick(mode){
  const label={quiz:'Wybierz zakres quizu',cards:'Wybierz zestaw fiszek',oral:'Wybierz lekturę do ćwiczenia'}[mode];
  const allBtn = mode==='quiz'
    ? `<button class="pick" onclick="go('quiz',-1)"><div class="dot alldot"></div><div><b>Wszystkie lektury — quiz mieszany</b><small>Losowe pytania ze wszystkich 9 książek</small></div><div class="spacer"></div><span>→</span></button>`
    : '';
  app.innerHTML=`<div class="screen"><div class="crumb"><button class="back" onclick="go('home')">← Menu</button><span class="chip">${label}</span></div>
    <div class="picker">${allBtn}${BOOKS.map(b=>{const goTo=mode==='quiz'?`go('quiz',${b.id})`:mode==='cards'?`go('cards',${b.id})`:`go('oral',${b.id})`;
      const cnt=mode==='quiz'?b.quiz.length+' pytań':mode==='cards'?(b.terms.length+b.cards.length)+' fiszek ('+b.terms.length+' zagadnień)':b.oral.length+' pytań ustnych';
      return `<button class="pick" style="--bc:${b.c}" onclick="${goTo}"><div class="dot"></div><div><b>${b.title}</b><small>${b.author} · ${cnt}</small></div><div class="spacer"></div><span>→</span></button>`;}).join('')}</div></div>`;
}

let quizList=[],qi=0,qScore=0,qLocked=false,quizBookLabel='';
function buildQuiz(bookId){let arr=[];
  if(bookId===-1){BOOKS.forEach(b=>b.quiz.forEach(q=>arr.push({...q,bc:b.c,src:b.id})));arr=shuffle(arr).slice(0,12);quizBookLabel='Wszystkie lektury';}
  else{const b=BOOKS[bookId];arr=b.quiz.map(q=>({...q,bc:b.c,src:b.id}));quizBookLabel=b.title;}
  return arr;}
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function renderQuiz(bookId){quizList=buildQuiz(bookId);qi=0;qScore=0;bestStreakThisRun=0;paintQuestion();}
function paintQuestion(){qLocked=false;const q=quizList[qi];const bc=q.bc;
  const dots=quizList.map((_,i)=>`<i class="${i<qi?(quizList[i]._ok?'ok':'no'):i===qi?'cur':''}"></i>`).join('');
  app.innerHTML=`<div class="screen"><div class="panel" style="--bc:${bc}">
    <div class="crumb"><button class="back" onclick="go('home')">← Przerwij</button><span class="chip book-chip">${quizBookLabel}</span><span class="chip">Pytanie ${qi+1}/${quizList.length}</span></div>
    <div class="progress-dots">${dots}</div>
    <div class="q">${esc(q.q)}</div>
    <div class="opts" id="opts">${q.o.map((o,i)=>`<button class="opt" data-i="${i}"><span class="key">${'ABCD'[i]}</span>${esc(o)}</button>`).join('')}</div>
    <div id="after"></div>
  </div></div>`;
  document.getElementById('opts').addEventListener('click',e=>{const btn=e.target.closest('.opt');if(btn)answer(+btn.dataset.i);});
}
function answer(i){if(qLocked)return;qLocked=true;const q=quizList[qi];const correct=q.a;q._ok=(i===correct);
  document.querySelectorAll('.opt').forEach(o=>{o.classList.add('locked');const oi=+o.dataset.i;if(oi===correct)o.classList.add('correct');else if(oi===i)o.classList.add('wrong');});
  if(i===correct){pts+=10+streak*2;streak++;bestStreakThisRun=Math.max(bestStreakThisRun,streak);qScore++;
    if(mastery[q.src]<BOOKS[q.src].quiz.length)mastery[q.src]++;}
  else{streak=0;}
  syncStats();saveState();
  const last=qi===quizList.length-1;
  document.getElementById('after').innerHTML=`<div class="explain"><b>${i===correct?'Dobrze! ✓':'Poprawna odpowiedź: '+'ABCD'[correct]}</b> — ${esc(q.e)}</div>
    <div class="row-actions"><span class="feedline ${i===correct?'ok':'no'}">${i===correct?('+'+(10+(streak-1)*2)+' pkt'):'Zapamiętaj tę odpowiedź'}</span>
    <button class="btn" onclick="${last?'quizDone()':'nextQ()'}">${last?'Zobacz wynik':'Dalej →'}</button></div>`;
}
function nextQ(){qi++;window.scrollTo({top:0,behavior:'smooth'});paintQuestion();}
function quizDone(){const total=quizList.length;const pctv=Math.round(qScore/total*100);
  const grade=pctv>=90?'Bez pytań — zaliczone 🎓':pctv>=70?'Dobrze! Jeszcze szlif':pctv>=50?'Nieźle — powtórz błędy':'Wróć do fiszek i spróbuj znów';
  const spark=pctv>=70?'🎉':pctv>=50?'💪':'📚';if(pctv>=70)confetti();
  app.innerHTML=`<div class="screen"><div class="panel result">
    <div class="spark">${spark}</div>
    <div class="big">${qScore}/${total}</div>
    <div class="grade">${grade}</div>
    <p>Skuteczność ${pctv}% · najdłuższa seria: ${bestStreakThisRun} 🔥</p>
    <button class="btn ghost" onclick="go('quizPick')">Inny quiz</button>
    <button class="btn" onclick="go('home')">Menu</button>
  </div></div>`;
}
function confetti(){const cols=['#f4bd63','#ef7f4c','#b07de0','#6d8bff','#48c78e','#e05a8a'];
  for(let k=0;k<70;k++){const c=document.createElement('div');c.className='confetti';c.style.left=Math.random()*100+'vw';
    c.style.background=cols[k%cols.length];c.style.animationDuration=(2.4+Math.random()*1.8)+'s';c.style.animationDelay=(Math.random()*.5)+'s';
    document.body.appendChild(c);setTimeout(()=>c.remove(),4800);}}

// ---------- FLASHCARDS (zagadnienia + pytania, z notką pod spodem) ----------
let cardList=[],ci=0,flipped=false,cardBook=null,cardFilter='all';
function renderCards(bookId){cardBook=BOOKS[bookId];cardFilter='all';buildDeck();ci=0;flipped=false;paintCard();}
function buildDeck(){
  const terms=cardBook.terms.map(x=>({...x,kind:'term'}));
  const ques=cardBook.cards.map(x=>({...x,kind:'card'}));
  if(cardFilter==='terms')cardList=terms;
  else if(cardFilter==='cards')cardList=ques;
  else cardList=terms.concat(ques);
}
function setFilter(f){cardFilter=f;buildDeck();ci=0;flipped=false;paintCard();}
function paintCard(){const c=cardList[ci];const bc=cardBook.c;
  const frontTag=c.kind==='term'?'Zagadnienie':'Pytanie';
  const backTag=c.kind==='term'?'Definicja':'Odpowiedź';
  app.innerHTML=`<div class="screen"><div class="crumb"><button class="back" onclick="go('cardPick')">← Zestawy</button><span class="chip book-chip" style="--bc:${bc}">${cardBook.title}</span></div>
   <div class="deck-toggle" style="--bc:${bc}">
     <button class="dt ${cardFilter==='all'?'active':''}" onclick="setFilter('all')">Wszystko (${cardBook.terms.length+cardBook.cards.length})</button>
     <button class="dt ${cardFilter==='terms'?'active':''}" onclick="setFilter('terms')">Zagadnienia (${cardBook.terms.length})</button>
     <button class="dt ${cardFilter==='cards'?'active':''}" onclick="setFilter('cards')">Pytania (${cardBook.cards.length})</button>
   </div>
   <div class="fc-scene"><div class="fc ${flipped?'flip':''}" id="fc" style="--bc:${bc}">
     <div class="fc-face fc-front"><div class="tag">${frontTag}</div><div class="txt">${esc(c.q)}</div></div>
     <div class="fc-face fc-back"><div class="tag">${backTag}</div><div class="txt">${esc(c.a)}</div></div>
   </div></div>
   ${c.note?`<div class="fc-note"><span class="bulb">💡</span><div><b>Wskazówka:</b> ${esc(c.note)}</div></div>`:''}
   <div class="fc-hint">Kliknij kartę, aby ją obrócić</div>
   <div class="fc-nav">
     <button class="iconbtn" onclick="prevCard()">←</button>
     <div class="fc-mark"><button class="mk again" onclick="nextCard()">↻ Powtórz</button><button class="mk know" onclick="nextCard()">✓ Umiem</button></div>
     <button class="iconbtn" onclick="nextCard()">→</button>
   </div>
   <div class="counter">Fiszka ${ci+1} z ${cardList.length}</div></div>`;
  document.getElementById('fc').addEventListener('click',()=>{flipped=!flipped;document.getElementById('fc').classList.toggle('flip');});
}
function nextCard(){if(ci<cardList.length-1){ci++;flipped=false;paintCard();}else{
  app.innerHTML=`<div class="screen"><div class="panel result"><div class="spark">🔄</div><div class="grade">Przejrzałeś zestaw z „${cardBook.title}”</div><p>Sprawdź się teraz w quizie tej lektury.</p><button class="btn ghost" onclick="go('cardPick')">Inne fiszki</button><button class="btn" onclick="go('quiz',${cardBook.id})">Quiz: ${cardBook.title}</button></div></div>`;}}
function prevCard(){if(ci>0){ci--;flipped=false;paintCard();}}

let oralList=[],oi2=0,oralBook=null,revealed=false;
function renderOral(bookId){oralBook=BOOKS[bookId];oralList=oralBook.oral.slice();oi2=0;revealed=false;paintOral();}
function paintOral(){const item=oralList[oi2];const bc=oralBook.c;const last=oi2===oralList.length-1;
  app.innerHTML=`<div class="screen"><div class="panel" style="--bc:${bc}">
    <div class="crumb"><button class="back" onclick="go('oralPick')">← Lektury</button><span class="chip book-chip">${oralBook.title}</span><span class="chip">${oi2+1}/${oralList.length}</span></div>
    <div class="oral-q">${esc(item.q)}</div>
    <div class="oral-say">🎤 Powiedz odpowiedź <b>na głos</b> (30–90 s), dopiero potem odsłoń wzór.</div>
    <div class="reveal ${revealed?'open':''}" id="rev"><div class="model"><span class="lbl">Wzorcowa odpowiedź</span>${esc(item.a)}</div></div>
    <div class="row-actions">
      <button class="btn ghost" id="revBtn" onclick="toggleReveal()">${revealed?'Ukryj wzór':'Pokaż wzorcową odpowiedź'}</button>
      <button class="btn" onclick="${last?"go('oralPick')":'nextOral()'}">${last?'Koniec zestawu':'Następne →'}</button>
    </div></div></div>`;
}
function toggleReveal(){revealed=!revealed;document.getElementById('rev').classList.toggle('open',revealed);document.getElementById('revBtn').textContent=revealed?'Ukryj wzór':'Pokaż wzorcową odpowiedź';}
function nextOral(){oi2++;revealed=false;paintOral();}

// --- easter-egg: motywy dla Maćka i Wiktorii ---
const TKEY='obrona100_theme';
let toastT=null;
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),2600);}
function updatePlayers(t){document.querySelectorAll('.pl').forEach(p=>p.classList.toggle('on',(p.getAttribute('data-theme')||'')===(t||'')));}
function fxBurst(emojis,dir,n){for(let k=0;k<n;k++){const e=document.createElement('div');e.className='fx';
  e.textContent=emojis[k%emojis.length];e.style.left=(Math.random()*100)+'vw';
  e.style.top=dir==='up'?'96vh':'-8vh';e.style.fontSize=(1.1+Math.random()*1.6)+'rem';
  e.style.animation=(dir==='up'?'fxUp':'fxDown')+' '+(3.2+Math.random()*2.4)+'s linear forwards';
  e.style.animationDelay=(Math.random()*.7)+'s';
  document.body.appendChild(e);setTimeout(()=>e.remove(),6800);}}
function setTheme(t){document.body.classList.remove('theme-pride','theme-emo');
  if(t)document.body.classList.add('theme-'+t);
  try{localStorage.setItem(TKEY,t||'');}catch(e){}
  updatePlayers(t);
  if(t==='pride'){toast('🌈💖 SIEMA MACIEJ — 100% GEJ MODE 💖🌈');confetti();fxBurst(['🌈','✨','💖','🏳️‍🌈','💅','🦄'],'up',20);}
  else if(t==='emo'){toast('🥀 witaj w mroku, wiktorio †');fxBurst(['🖤','🥀','†','🦇','⛧'],'down',18);}
  else toast('🎓 Tryb domyślny');}
function loadTheme(){let t='';try{t=localStorage.getItem(TKEY)||'';}catch(e){}
  if(t)document.body.classList.add('theme-'+t);updatePlayers(t);}

loadState();loadTheme();syncStats();renderHome();
</script>
</body>
</html>
